<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Supervisor dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714; --ink2: #4a4540; --ink3: #8a837c;
    --paper: #f7f4ef; --paper2: #ede9e2;
    --accent: #534AB7; --accent-l: #EEEDFE; --rule: #d8d2c8;
    --danger: #E24B4A; --danger-l: #FCEBEB; --danger-b: #F09595;
    --c1:#1D9E75;--c2:#1D9E75;--c3:#639922;--c4:#639922;
    --c5:#BA7517;--c6:#BA7517;--c7:#D85A30;--c8:#D85A30;
    --c9:#E24B4A;--c10:#A32D2D;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 280px; flex-shrink: 0; background: var(--ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { flex: 1; min-width: 0; padding: 2.5rem 3rem 4rem; }
  .sb-head { padding: 2rem 1.5rem 1.5rem; border-bottom: 1px solid #ffffff18; }
  .sb-logo { font-family: 'Libre Baskerville', serif; font-size: 15px; color: #fff; margin-bottom: 4px; }
  .sb-sub { font-size: 12px; color: #ffffff60; }
  .sb-logout { display: block; margin: 1rem 1.5rem 0; font-size: 12px; color: #ffffff50; text-decoration: none; padding: 6px 10px; border: 1px solid #ffffff20; border-radius: 6px; text-align: center; transition: all .2s; }
  .sb-logout:hover { color: #fff; border-color: #ffffff50; }
  .sb-section { padding: 1rem 1.5rem 0.5rem; font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: #ffffff40; }
  .sb-student { display: flex; align-items: center; gap: 10px; padding: 10px 1.5rem; cursor: pointer; transition: background .15s; border-left: 3px solid transparent; }
  .sb-student:hover { background: #ffffff10; }
  .sb-student.active { background: #ffffff15; border-left-color: var(--accent); }
  .sb-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; background: #ffffff20; color: #fff; }
  .sb-name { font-size: 13px; color: #ffffffcc; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-anx { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .sb-alert { width: 8px; height: 8px; border-radius: 50%; background: #E24B4A; flex-shrink: 0; }
  .page-title { font-family: 'Libre Baskerville', serif; font-size: 28px; font-weight: 400; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--ink3); margin-bottom: 2.5rem; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 2.5rem; }
  .metric { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 1.25rem; }
  .metric-l { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
  .metric-v { font-family: 'Libre Baskerville', serif; font-size: 28px; }
  .metric-s { font-size: 12px; color: var(--ink3); margin-top: 4px; }
  .alerts { margin-bottom: 2rem; }
  .alert { background: var(--danger-l); border: 1px solid var(--danger-b); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #791F1F; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
  .section-title { font-family: 'Libre Baskerville', serif; font-size: 17px; font-weight: 400; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .scard { background: #fff; border: 1px solid var(--rule); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: all .2s; }
  .scard:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px #534AB715; }
  .scard-top { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .scard-av { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: var(--accent); flex-shrink: 0; }
  .scard-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .scard-meta { font-size: 12px; color: var(--ink3); }
  .scard-anx { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; color: #fff; margin-left: auto; flex-shrink: 0; }
  .sparkline { display: flex; align-items: flex-end; gap: 3px; height: 36px; margin-bottom: 8px; }
  .spark-col { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
  .spark-bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; }
  .scard-trend { font-size: 12px; color: var(--ink3); }
  .trend-up { color: #D85A30; } .trend-down { color: #1D9E75; } .trend-flat { color: var(--ink3); }
  .deadline-overdue { font-size:11px;font-weight:500;color:#791F1F;background:#FCEBEB;border:1px solid #F09595;border-radius:4px;padding:2px 7px; }
  .deadline-soon { font-size:11px;font-weight:500;color:#633806;background:#FAEEDA;border:1px solid #FAC775;border-radius:4px;padding:2px 7px; }
  .deadline-upcoming { font-size:11px;color:var(--ink3);background:var(--paper2);border-radius:4px;padding:2px 7px; }
  .deadline-distant { font-size:11px;color:var(--ink3);background:var(--paper2);border-radius:4px;padding:2px 7px; }
  .sb-deadline { font-size:10px;color:#ffffff50;margin-top:1px; }
  .detail-back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink3); cursor: pointer; margin-bottom: 1.5rem; padding: 6px 12px; border: 1px solid var(--rule); border-radius: 6px; background: #fff; transition: all .15s; }
  .detail-back:hover { color: var(--ink); border-color: var(--ink3); }
  .detail-header { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--rule); }
  .detail-av { width: 56px; height: 56px; border-radius: 50%; background: var(--accent-l); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; color: var(--accent); flex-shrink: 0; }
  .detail-name { font-family: 'Libre Baskerville', serif; font-size: 24px; font-weight: 400; margin-bottom: 4px; }
  .detail-thesis { font-size: 14px; color: var(--ink3); font-style: italic; margin-bottom: 4px; }
  .detail-meta { font-size: 13px; color: var(--ink3); }
  .btn-delete-student { border: 1px solid var(--danger-b); border-radius: 6px; padding: 6px 14px; font-size: 13px; background: var(--danger-l); color: #791F1F; cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap; }
  .btn-delete-student:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  .btn-delete-checkin { border: none; background: none; color: var(--ink3); cursor: pointer; font-size: 12px; padding: 4px 10px; border-radius: 4px; font-family: inherit; transition: all .15s; }
  .btn-delete-checkin:hover { background: var(--danger-l); color: #791F1F; }
  .anx-chart { background: #fff; border: 1px solid var(--rule); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .anx-chart-title { font-size: 12px; font-weight: 500; color: var(--ink3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 1.25rem; }
  .anx-chart-body { display: flex; align-items: flex-end; gap: 6px; height: 80px; }
  .anx-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .anx-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; }
  .anx-val { font-size: 11px; font-weight: 500; }
  .anx-date { font-size: 10px; color: var(--ink3); white-space: nowrap; }
  .anx-empty { font-size: 13px; color: var(--ink3); font-style: italic; }
  .checkin-list { display: flex; flex-direction: column; gap: 14px; }
  .checkin-card { background: #fff; border: 1px solid var(--rule); border-radius: 12px; overflow: hidden; }
  .checkin-head { display: flex; align-items: center; gap: 12px; padding: 1rem 1.25rem; cursor: pointer; transition: background .15s; }
  .checkin-head:hover { background: var(--paper); }
  .checkin-date { font-family: 'Libre Baskerville', serif; font-size: 15px; flex: 1; }
  .pill { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 500; background: var(--paper2); color: var(--ink2); margin-right: 4px; }
  .checkin-anx { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .chevron { font-size: 12px; color: var(--ink3); transition: transform .2s; flex-shrink: 0; }
  .checkin-card.open .chevron { transform: rotate(180deg); }
  .checkin-body { display: none; padding: 0 1.25rem 1.25rem; border-top: 1px solid var(--rule); }
  .checkin-card.open .checkin-body { display: block; }
  .checkin-body-actions { display: flex; justify-content: flex-end; padding-top: 10px; margin-bottom: 2px; }
  .qa-grid { display: grid; grid-template-columns: 160px 1fr; gap: 0; margin-top: 1rem; }
  .qa-label { font-size: 12px; color: var(--ink3); padding: 8px 12px 8px 0; border-bottom: 1px solid var(--paper2); line-height: 1.4; }
  .qa-value { font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--paper2); line-height: 1.6; }
  .tasks-done { color: var(--c1); font-size: 13px; margin-bottom: 3px; }
  .tasks-miss { color: var(--ink3); font-size: 13px; margin-bottom: 3px; text-decoration: line-through; }
  .tasks-next-item { font-size: 13px; color: var(--ink2); margin-bottom: 3px; }
  .modal-bg { display: none; position: fixed; inset: 0; background: #00000055; z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 2rem; max-width: 400px; width: 90%; }
  .modal h3 { font-family: 'Libre Baskerville', serif; font-size: 18px; font-weight: 400; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--ink3); line-height: 1.6; margin-bottom: 1.5rem; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { border: 1px solid var(--rule); border-radius: 8px; padding: 0 18px; height: 38px; font-size: 14px; background: transparent; color: var(--ink3); cursor: pointer; font-family: inherit; }
  .btn-confirm { border: 1px solid var(--danger); border-radius: 8px; padding: 0 18px; height: 38px; font-size: 14px; font-weight: 500; background: var(--danger); color: #fff; cursor: pointer; font-family: inherit; }
  .loading { text-align: center; padding: 4rem; color: var(--ink3); font-size: 14px; font-style: italic; }
  .empty { text-align: center; padding: 4rem; color: var(--ink3); font-size: 14px; font-style: italic; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">Thesis tracker</div>
      <div class="sb-sub">Supervisor dashboard</div>
      <a class="sb-logout" href="/dashboard/logout">Sign out</a>
    </div>
    <div class="sb-section">Overview</div>
    <div class="sb-student active" onclick="showOverview()" id="sb-overview">
      <div class="sb-avatar" style="background:#ffffff20;">&#9632;</div>
      <span class="sb-name">All students</span>
    </div>
    <div class="sb-section">Students</div>
    <div id="sb-students"></div>
  </aside>

  <main class="main">
    <div id="loading" class="loading">Loading check-in data…</div>

    <div id="overview" style="display:none;">
      <h1 class="page-title">All students</h1>
      <p class="page-sub" id="overview-sub"></p>
      <div class="metrics" id="metrics"></div>
      <div class="alerts" id="alerts"></div>
      <div class="section-title">Student anxiety at a glance</div>
      <div class="student-grid" id="student-grid"></div>
    </div>

    <div id="student-detail" style="display:none;">
      <div class="detail-back" onclick="showOverview()">&#8592; All students</div>
      <div class="detail-header">
        <div class="detail-av" id="d-av"></div>
        <div style="flex:1;min-width:0;">
          <div class="detail-name" id="d-name"></div>
          <div class="detail-thesis" id="d-thesis"></div>
          <div class="detail-meta" id="d-meta"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;"><span id="d-deadline-badge" style="display:none;"></span><button class="btn-delete-student" onclick="confirmDeleteStudent()">Delete student</button></div>
      </div>
      <div id="d-profile" style="display:none;"></div>
      <div class="anx-chart">
        <div class="anx-chart-title">Anxiety over time</div>
        <div class="anx-chart-body" id="anx-chart"></div>
      </div>
      <div class="section-title" id="d-checkin-title"></div>
      <div class="checkin-list" id="checkin-list"></div>
    </div>
  </main>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
const AC={1:'#1D9E75',2:'#1D9E75',3:'#639922',4:'#639922',5:'#BA7517',6:'#BA7517',7:'#D85A30',8:'#D85A30',9:'#E24B4A',10:'#A32D2D'};
let allData=[], curIdx=null;
const ac=n=>AC[n]||'#ccc';
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const fd=s=>new Date(s).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
const fds=s=>new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const fdm=s=>new Date(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
function fmtDeadline(dl){
  if(!dl)return null;
  const [y,m]=dl.split('-');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1]+' '+y;
}
function deadlineUrgency(dl){
  if(!dl)return null;
  const [y,m]=dl.split('-');
  const now=new Date();
  const due=new Date(parseInt(y),parseInt(m)-1,1);
  const months=(due.getFullYear()-now.getFullYear())*12+(due.getMonth()-now.getMonth());
  if(months<0)return'overdue';
  if(months<=3)return'soon';
  if(months<=6)return'upcoming';
  return'distant';
}

function showModal(title,desc,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-desc').textContent=desc;
  document.getElementById('modal-confirm').onclick=()=>{closeModal();onConfirm();};
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});

async function load(){
  let data=[];
  try{const r=await fetch('/api/dashboard');if(r.status===401){window.location.href='/dashboard';return;}data=await r.json();}catch(e){}
  allData=data;
  document.getElementById('loading').style.display='none';
  if(!data.length){document.getElementById('overview').style.display='block';document.getElementById('overview').innerHTML='<p class="empty">No check-ins submitted yet.</p>';return;}
  buildSidebar(data);buildOverview(data);
  document.getElementById('overview').style.display='block';
}

function buildSidebar(data){
  const el=document.getElementById('sb-students');el.innerHTML='';
  data.forEach((s,i)=>{
    const l=s.checkins[s.checkins.length-1];const anx=l?.anxiety||null;
    const div=document.createElement('div');div.className='sb-student';div.id='sb-s'+i;div.onclick=()=>showStudent(i);
    const sDl=s.profile?.deadline||null;
    const sDlLabel=fmtDeadline(sDl);
    const sDlUrg=deadlineUrgency(sDl);
    div.innerHTML=`<div class="sb-avatar">${ini(s.name)}</div><div style="flex:1;min-width:0;"><div class="sb-name" style="margin-bottom:${sDlLabel?'1px':'0'}">${s.name}</div>${sDlLabel?`<div class="sb-deadline" style="color:${sDlUrg==='overdue'?'#F09595':sDlUrg==='soon'?'#FAC775':'#ffffff50'};">⏱ ${sDlLabel}</div>`:''}</div>${anx>=8?'<span class="sb-alert"></span>':''}${anx?`<div class="sb-anx" style="background:${ac(anx)}">${anx}</div>`:''}`;
    el.appendChild(div);
  });
}

function buildOverview(data){
  const total=data.reduce((a,s)=>a+s.checkins.length,0);
  const la=data.map(s=>s.checkins[s.checkins.length-1]?.anxiety).filter(Boolean);
  const avg=la.length?(la.reduce((a,b)=>a+b,0)/la.length).toFixed(1):'—';
  const high=la.filter(a=>a>=8).length;
  document.getElementById('overview-sub').textContent=`${data.length} student${data.length!==1?'s':''} · ${total} check-in${total!==1?'s':''} total`;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-l">Students</div><div class="metric-v">${data.length}</div></div>
    <div class="metric"><div class="metric-l">Total check-ins</div><div class="metric-v">${total}</div></div>
    <div class="metric"><div class="metric-l">Avg anxiety (latest)</div><div class="metric-v">${avg}</div><div class="metric-s">out of 10</div></div>
    <div class="metric"><div class="metric-l">High anxiety (≥8)</div><div class="metric-v" style="color:${high>0?'#E24B4A':'inherit'}">${high}</div><div class="metric-s">student${high!==1?'s':''} flagged</div></div>
  `;
  const alerts=document.getElementById('alerts');alerts.innerHTML='';
  data.forEach((s,i)=>{const l=s.checkins[s.checkins.length-1];if(l?.anxiety>=8){const d=document.createElement('div');d.className='alert';d.innerHTML=`<span class="alert-dot"></span><strong>${s.name}</strong> reported anxiety ${l.anxiety}/10 on ${fdm(l.submitted_at)} — <a href="#" onclick="showStudent(${i});return false;" style="color:#791F1F;">view check-ins</a>`;alerts.appendChild(d);}});
  const grid=document.getElementById('student-grid');grid.innerHTML='';
  data.forEach((s,i)=>{
    const l=s.checkins[s.checkins.length-1];const prev=s.checkins.length>1?s.checkins[s.checkins.length-2]:null;
    const anx=l?.anxiety||null;const diff=prev?.anxiety&&anx?anx-prev.anxiety:null;
    let tr='';if(diff!==null){if(diff>0)tr=`<span class="trend-up">▲ ${diff} since last</span>`;else if(diff<0)tr=`<span class="trend-down">▼ ${Math.abs(diff)} since last</span>`;else tr=`<span class="trend-flat">No change</span>`;}
    const bars=s.checkins.map(c=>{const v=c.anxiety||0;const h=Math.round((v/10)*36);return`<div class="spark-col"><div class="spark-bar" style="height:${h}px;background:${ac(v)};"></div></div>`;}).join('');
    const card=document.createElement('div');card.className='scard';card.onclick=()=>showStudent(i);
    const dl=s.profile?.deadline||null;
    const dlLabel=fmtDeadline(dl);
    const dlUrg=deadlineUrgency(dl);
    const dlHtml=dlLabel?`<span class="deadline-${dlUrg}">${dlUrg==='overdue'?'Overdue · ':dlUrg==='soon'?'Due soon · ':''}${dlLabel}</span>`:'';
    card.innerHTML=`<div class="scard-top"><div class="scard-av">${ini(s.name)}</div><div><div class="scard-name">${s.name}</div><div class="scard-meta">${s.checkins.length} check-in${s.checkins.length!==1?'s':''} · last ${fdm(l?.submitted_at||'')}</div></div>${anx?`<div class="scard-anx" style="background:${ac(anx)}">${anx}</div>`:''}</div><div class="sparkline">${bars}</div><div style="display:flex;justify-content:space-between;align-items:center;"><div class="scard-trend">${tr}</div>${dlHtml}</div>`;
    grid.appendChild(card);
  });
}

function showOverview(){
  document.getElementById('overview').style.display='block';
  document.getElementById('student-detail').style.display='none';
  document.querySelectorAll('.sb-student').forEach(el=>el.classList.remove('active'));
  document.getElementById('sb-overview').classList.add('active');
  curIdx=null;
}

function showStudent(i){
  const s=allData[i];if(!s)return;
  curIdx=i;
  document.getElementById('overview').style.display='none';
  document.getElementById('student-detail').style.display='block';
  document.querySelectorAll('.sb-student').forEach(el=>el.classList.remove('active'));
  const sbEl=document.getElementById('sb-s'+i);if(sbEl)sbEl.classList.add('active');
  document.getElementById('sb-overview').classList.remove('active');

  const prof=s.profile;
  document.getElementById('d-av').textContent=ini(s.name);
  document.getElementById('d-name').textContent=s.name;
  document.getElementById('d-thesis').textContent=(prof&&prof.thesis_title)||s.thesis||'No thesis title recorded';
  const dDl=s.profile?.deadline||null;
  const dDlStr=fmtDeadline(dDl);
  const dDlUrg=deadlineUrgency(dDl);
  document.getElementById('d-meta').textContent=`${s.checkins.length} check-in${s.checkins.length!==1?'s':''} · enrolled ${fdm(s.enrolled||'')}${dDlStr?' · submission: '+dDlStr:''}`;
  const dDlBadge=document.getElementById('d-deadline-badge');
  if(dDlBadge){
    if(dDlStr){dDlBadge.textContent=(dDlUrg==='overdue'?'Overdue · ':dDlUrg==='soon'?'Due soon · ':'')+dDlStr;dDlBadge.className='deadline-'+dDlUrg;dDlBadge.style.display='inline-block';}
    else{dDlBadge.style.display='none';}
  }

  const profEl=document.getElementById('d-profile');
  if(prof){
    const chs=(()=>{try{return JSON.parse(prof.chapters||'[]');}catch(e){return[];}})();
    const mss=(()=>{try{return JSON.parse(prof.milestones||'[]');}catch(e){return[];}})();
    const chHtml=chs.map((c,ci)=>`<div style="margin-bottom:10px;"><div style="font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;">Chapter ${ci+1}</div><div style="font-size:14px;font-weight:500;">${c.title||'Untitled'}</div>${c.description?`<div style="font-size:13px;color:var(--ink2);line-height:1.5;margin-top:2px;">${c.description}</div>`:''}</div>`).join('');
    const msHtml=mss.filter(m=>m.month).map(m=>`<div class="qa-label">${m.label}</div><div class="qa-value">${m.month}</div>`).join('');
    profEl.innerHTML=`<div class="anx-chart" style="margin-bottom:1.5rem;"><div class="anx-chart-title">Context profile</div><div class="qa-grid" style="margin-top:0;">${prof.research_question?`<div class="qa-label">Research question</div><div class="qa-value">${prof.research_question}</div>`:''}${prof.field?`<div class="qa-label">Field</div><div class="qa-value">${prof.field}</div>`:''}${prof.current_stage?`<div class="qa-label">Current stage</div><div class="qa-value">${prof.current_stage}</div>`:''}${prof.deadline?`<div class="qa-label">Deadline</div><div class="qa-value">${prof.deadline}</div>`:''}${prof.timeline_concerns?`<div class="qa-label">Timeline concerns</div><div class="qa-value">${prof.timeline_concerns}</div>`:''}</div>${chHtml?`<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--rule);"><div class="anx-chart-title" style="margin-bottom:12px;">Chapter outline</div>${chHtml}</div>`:''}${msHtml?`<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--rule);"><div class="anx-chart-title" style="margin-bottom:8px;">Milestones</div><div class="qa-grid" style="margin-top:0;">${msHtml}</div></div>`:''}</div>`;
    profEl.style.display='block';
  } else {
    profEl.innerHTML=`<div class="anx-chart" style="margin-bottom:1.5rem;"><div class="anx-chart-title">Context profile</div><p style="font-size:13px;color:var(--ink3);font-style:italic;margin:0;">No context profile submitted yet. Share <strong>/profile</strong> with this student.</p></div>`;
    profEl.style.display='block';
  }

  const chart=document.getElementById('anx-chart');
  if(!s.checkins.length){chart.innerHTML='<span class="anx-empty">No check-ins yet</span>';}
  else{chart.innerHTML=s.checkins.map(c=>{const v=c.anxiety||0;const h=Math.round((v/10)*80);return`<div class="anx-col"><div class="anx-val" style="color:${ac(v)}">${v||'—'}</div><div class="anx-bar" style="height:${h}px;background:${ac(v)};"></div><div class="anx-date">${fds(c.submitted_at)}</div></div>`;}).join('');}

  document.getElementById('d-checkin-title').textContent=`Check-in history (${s.checkins.length})`;
  const list=document.getElementById('checkin-list');list.innerHTML='';
  [...s.checkins].reverse().forEach((c,ci)=>{
    const anx=c.anxiety;
    const tp=(()=>{try{return JSON.parse(c.tasks_prev||'[]');}catch(e){return[];}})();
    const tn=(()=>{try{return JSON.parse(c.tasks_next||'[]');}catch(e){return[];}})();
    const pdH=tp.filter(t=>t.completed).map(t=>`<div class="tasks-done">✓ ${t.task}</div>`).join('');
    const pmH=tp.filter(t=>!t.completed).map(t=>`<div class="tasks-miss">${t.task}</div>`).join('');
    const ntH=tn.map(t=>`<div class="tasks-next-item">· ${t}</div>`).join('');
    const card=document.createElement('div');card.className='checkin-card'+(ci===0?' open':'');
    card.innerHTML=`
      <div class="checkin-head" onclick="toggleCard(this.parentElement)">
        <div class="checkin-date">${fd(c.submitted_at)}</div>
        ${c.mood?`<span class="pill">${c.mood}</span>`:''}
        ${c.hours?`<span class="pill">${c.hours}h</span>`:''}
        ${anx?`<div class="checkin-anx" style="background:${ac(anx)}">${anx}</div>`:''}
        <span class="chevron">▼</span>
      </div>
      <div class="checkin-body">
        <div class="checkin-body-actions">
          <button class="btn-delete-checkin" onclick="confirmDeleteCheckin(${c.id},'${c.submitted_at}')">Delete this check-in</button>
        </div>
        <div class="qa-grid">
          ${c.progress?`<div class="qa-label">Progress</div><div class="qa-value">${c.progress}</div>`:''}
          ${c.excitement?`<div class="qa-label">Excited about</div><div class="qa-value">${c.excitement}</div>`:''}
          ${c.challenges?`<div class="qa-label">Challenges</div><div class="qa-value">${c.challenges}</div>`:''}
          ${c.blockers?`<div class="qa-label">Blockers</div><div class="qa-value">${c.blockers}</div>`:''}
          ${anx?`<div class="qa-label">Anxiety</div><div class="qa-value" style="color:${ac(anx)};font-weight:500;">${anx}/10</div>`:''}
          ${c.support?`<div class="qa-label">Needs from you</div><div class="qa-value">${c.support}</div>`:''}
          ${c.other?`<div class="qa-label">Other notes</div><div class="qa-value">${c.other}</div>`:''}
          ${pdH||pmH?`<div class="qa-label">Previous tasks</div><div class="qa-value">${pdH}${pmH}</div>`:''}
          ${ntH?`<div class="qa-label">Planned tasks</div><div class="qa-value">${ntH}</div>`:''}
        </div>
      </div>`;
    list.appendChild(card);
  });
  window.scrollTo(0,0);
}

function toggleCard(card){card.classList.toggle('open');}

function confirmDeleteStudent(){
  const s=allData[curIdx];if(!s)return;
  showModal('Delete '+s.name+'?','This will permanently delete this student and all their check-ins and profile data. This cannot be undone.',()=>deleteStudent(s.email));
}
async function deleteStudent(email){
  try{
    const r=await fetch('/api/students/'+encodeURIComponent(email),{method:'DELETE'});
    if(r.ok){allData=allData.filter(s=>s.email!==email);buildSidebar(allData);buildOverview(allData);showOverview();}
  }catch(e){alert('Delete failed. Please try again.');}
}

function confirmDeleteCheckin(id,dateStr){
  showModal('Delete this check-in?','The check-in from '+fdm(dateStr)+' will be permanently deleted. This cannot be undone.',()=>deleteCheckin(id));
}
async function deleteCheckin(id){
  try{
    const r=await fetch('/api/checkins/'+id,{method:'DELETE'});
    if(r.ok){const s=allData[curIdx];s.checkins=s.checkins.filter(c=>c.id!==id);showStudent(curIdx);buildSidebar(allData);}
  }catch(e){alert('Delete failed. Please try again.');}
}

load();
</script>
</body>
</html>
